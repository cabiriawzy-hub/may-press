<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>AI 慢读月刊 · Vol 26.05</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Libre+Caslon+Display&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --topbar-height: 92px;
    --black: #000000;
    --ink: #111111;
    --ink-2: #333333;
    --rule: #e6e6e6;
    --rule-2: #cccccc;
    --paper: #ffffff;
    --muted: #6b6b6b;
    --muted-dk: #b3b3b3;
    --accent: #d62b1f;
    --blue: #6b8aa5;
    --blue-hover: #54748f;
    --sans: "Neue Haas Grotesk Text Pro", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
    --serif: "EB Garamond", "Adobe Caslon Pro", "Noto Serif SC", "Songti SC", Georgia, serif;
    --display: "Libre Caslon Display", "Noto Serif SC", "Songti SC", "STSong", Georgia, serif;
    --text: "Libre Caslon Text", "Noto Serif SC", "Songti SC", "EB Garamond", Georgia, serif;
    --cn-display: "Noto Serif SC", "Songti SC", "STSong", "Libre Caslon Display", Georgia, serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }
  body {
    font-family: var(--text);
    font-size: 17px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; display: block; }
  [hidden] { display: none !important; }

  /* ---------- Top bar ---------- */
  .topbar {
    background: var(--paper); color: var(--ink);
    padding: 18px 40px;
    position: sticky; top: 0; z-index: 50;
    border-bottom: 1px solid var(--rule);
  }
  .topbar-inner { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; }
  .topbar .wm {
    grid-column: 2;
    font-family: var(--display);
    font-size: 38px; line-height: 1; letter-spacing: -0.005em;
    text-align: center; color: var(--ink); margin: 0; cursor: pointer;
  }
  .topbar .wm .amp { color: var(--ink); font-family: var(--serif); font-style: italic; margin: 0 -0.03em; }
  .topbar .wm .the {
    display: block;
    font-family: var(--sans); font-size: 10px;
    letter-spacing: 0.32em; font-weight: 400;
    margin-bottom: 6px; color: var(--muted);
  }
  .topbar .right {
    grid-column: 3;
    display: flex; justify-content: flex-end; align-items: center; gap: 26px;
    font-family: var(--sans); font-size: 14px;
  }
  .topbar .subscribe {
    background: var(--blue); color: #fff; border: 0;
    padding: 6px 12px; border-radius: 2px;
    font-family: var(--sans); font-size: 12px; font-weight: 500;
    letter-spacing: 0.04em; cursor: pointer;
  }
  .topbar .subscribe:hover { background: var(--blue-hover); }
  .topbar .lang-toggle {
    background: transparent; color: var(--ink);
    border: 1px solid var(--rule-2);
    padding: 5px 9px; border-radius: 2px;
    font-family: var(--sans); font-size: 11px; font-weight: 500;
    letter-spacing: 0.08em; cursor: pointer; min-width: 36px;
  }
  .topbar .lang-toggle:hover { border-color: var(--ink); color: var(--accent); }
  .topbar .search-btn { background: transparent; border: 0; color: var(--ink); cursor: pointer; padding: 6px; }
  .topbar .search-btn:hover { color: var(--accent); }
  .topbar .search-btn svg { width: 18px; height: 18px; display: block; }

  /* ---------- Sticky nav ---------- */
  nav.primary {
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    position: sticky; top: var(--topbar-height); z-index: 40;
  }
  nav.primary .inner {
    display: flex; justify-content: center; align-items: center;
    gap: 38px; padding: 22px 40px;
    font-family: var(--sans); font-size: 15px; font-weight: 500;
    color: var(--ink);
    overflow-x: auto; scrollbar-width: none;
  }
  nav.primary .inner::-webkit-scrollbar { display: none; }
  nav.primary a { color: var(--ink); white-space: nowrap; padding: 4px 0; cursor: pointer; }
  nav.primary a:hover { color: var(--accent); }
  nav.primary a.current { color: var(--accent); border-bottom: 1.5px solid var(--accent); }

  /* ---------- Hero · 导读 ---------- */
  .hero {
    background: var(--paper); color: var(--ink);
    border-bottom: 1px solid var(--rule);
  }
  .hero-inner {
    display: grid; grid-template-columns: 1fr 1fr;
    max-width: 1500px; margin: 0 auto;
    min-height: 540px;
  }
  .hero .text {
    padding: 80px 80px 80px 64px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .hero .text h1, .hero .text .dek, .hero .text .kicker { cursor: pointer; }
  .hero .text h1:hover { color: var(--accent); }
  .hero .kicker {
    font-family: var(--sans); font-size: 12px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent); margin: 0 0 22px;
  }
  .hero h1 {
    font-family: var(--cn-display); font-weight: 600;
    font-size: clamp(40px, 4.4vw, 66px); line-height: 1.1;
    letter-spacing: 0.005em; margin: 0 0 26px; color: var(--ink);
    text-wrap: pretty;
  }
  .hero .dek {
    font-family: var(--cn-display); font-weight: 400;
    font-size: 20px; line-height: 1.7; color: var(--ink-2);
    margin: 0 0 34px; max-width: 600px;
  }
  .hero .cta {
    font-family: var(--sans); font-size: 13px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink);
    cursor: pointer; align-self: flex-start;
    border-bottom: 1.5px solid var(--accent); padding-bottom: 3px;
  }
  .hero .cta:hover { color: var(--accent); }
  /* hero side: 导读 cover image, fills the right half */
  .hero .hero-img {
    position: relative; overflow: hidden; background: #0e1430; cursor: pointer; min-height: 540px;
  }
  .hero .hero-img .ph-img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; object-position: center; z-index: 1;
  }

  /* ---------- Sections ---------- */
  section.feed { padding: 72px 40px 56px; max-width: 1500px; margin: 0 auto; }
  section.feed .section-title {
    text-align: center; font-family: var(--cn-display); font-weight: 600;
    font-size: clamp(30px, 2.6vw, 40px); letter-spacing: 0.06em;
    margin: 0 0 12px; color: var(--ink);
  }
  section.feed .section-sub {
    text-align: center; font-family: var(--sans); font-size: 11px;
    letter-spacing: 0.32em; color: var(--muted); margin: 0 0 50px; text-transform: uppercase;
  }
  section.feed .section-sub::before, section.feed .section-sub::after {
    content: ""; display: inline-block; width: 36px; height: 1px;
    background: var(--rule-2); vertical-align: middle; margin: 0 14px;
  }

  /* featured editorial split */
  .featured { padding: 16px 0 64px; }
  .featured-inner {
    display: grid; grid-template-columns: 1fr 1.2fr; gap: 64px; align-items: center;
  }
  .featured.flip .text { order: 2; }
  .featured.flip .image { order: 1; }
  .featured .text { padding: 0 8px; }
  .featured.center .text { text-align: center; }
  .featured .text .kicker {
    font-family: var(--sans); font-size: 12px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin: 0 0 22px;
  }
  .featured .text h2 {
    font-family: var(--cn-display); font-weight: 600;
    font-size: clamp(30px, 3vw, 48px); line-height: 1.18; letter-spacing: 0.005em;
    margin: 0 0 24px; color: var(--ink); text-wrap: pretty; cursor: pointer;
  }
  .featured .text h2:hover { color: var(--accent); }
  .featured .text .dek {
    font-family: var(--cn-display); font-weight: 400; font-size: 19px; line-height: 1.7;
    color: var(--ink-2); max-width: 560px; margin: 0 0 26px; text-wrap: pretty;
  }
  .featured.center .text .dek { margin-left: auto; margin-right: auto; }
  .featured .text .meta {
    font-family: var(--sans); font-size: 12px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--muted);
  }

  /* image placeholder (per-chapter colored, image covers it) */
  .ph {
    position: relative; width: 100%; overflow: hidden; background: #efece4;
  }
  .ph.r43 { aspect-ratio: 4 / 3; }
  .ph.r11 { aspect-ratio: 1 / 1; }
  .ph::before {
    content: ""; position: absolute; inset: 0; z-index: 0;
    background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.10) 0 1px, transparent 1px 11px);
    mix-blend-mode: overlay;
  }
  .ph .ph-img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; object-position: center; z-index: 1;
  }

  /* card grid */
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
  .grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .grid > .card { padding: 0 28px; border-right: 1px solid var(--rule); min-width: 0; }
  .grid > .card:last-child { border-right: 0; }
  .card .ph { margin-bottom: 20px; }
  .card .kicker {
    font-family: var(--sans); font-size: 11px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin: 0 0 12px;
  }
  .card h3 {
    font-family: var(--cn-display); font-weight: 600; font-size: 23px; line-height: 1.3;
    letter-spacing: 0.005em; margin: 0 0 13px; color: var(--ink); text-wrap: pretty; cursor: pointer;
  }
  .card h3:hover { color: var(--accent); }
  .card .dek {
    font-family: var(--cn-display); font-weight: 400; font-size: 15px; line-height: 1.7;
    color: var(--ink-2); margin: 0 0 12px;
  }
  .card .meta {
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
  }

  /* ---------- Footer ---------- */
  footer { background: var(--black); color: #b3b3b3; padding: 56px 40px 40px; font-family: var(--sans); }
  .foot-inner { max-width: 1440px; margin: 0 auto; }
  .foot-mast { text-align: center; padding-bottom: 36px; border-bottom: 1px solid #333; }
  .foot-mast .wm { font-family: var(--display); font-size: 36px; color: #fff; line-height: 1; margin: 0; cursor: pointer; }
  .foot-mast .wm .the {
    display: block; font-family: var(--sans); font-size: 9px;
    letter-spacing: 0.32em; margin-bottom: 6px; color: #fff; font-weight: 400;
  }
  .foot-mast .wm .amp { font-family: var(--serif); font-style: italic; color: #fff; margin: 0 -0.03em; }
  .foot-grid { display: flex; justify-content: center; gap: 90px; padding: 40px 0; border-bottom: 1px solid #333; }
  .foot-col { min-width: 120px; }
  .foot-col h4 { font-family: var(--cn-display); font-weight: 500; font-size: 16px; letter-spacing: 0.1em; color: #fff; margin: 0 0 22px; }
  .foot-col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 14px; }
  .foot-col a { font-family: var(--sans); font-size: 15px; color: #b3b3b3; font-weight: 400; cursor: pointer; }
  .foot-col a:hover { color: #fff; }
  .foot-bottom { padding-top: 28px; display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: center; }
  .foot-copy { font-family: var(--sans); font-size: 13px; color: #888; line-height: 1.6; max-width: 920px; }
  .foot-copy em { font-style: italic; }
  .socials { display: flex; gap: 22px; }
  .socials a { color: #fff; cursor: pointer; }
  .socials a:hover { color: var(--blue); }
  .socials svg { width: 20px; height: 20px; display: block; }

  /* ---------- Reading view ---------- */
  .article-head { max-width: 800px; margin: 0 auto; padding: 64px 40px 28px; text-align: center; }
  .article-head .back {
    display: inline-block; margin-bottom: 30px;
    font-family: var(--sans); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); cursor: pointer;
  }
  .article-head .back:hover { color: var(--accent); }
  .article-head .kicker {
    font-family: var(--sans); font-size: 11px; font-weight: 700;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin: 0 0 22px;
  }
  .article-head h1 {
    font-family: var(--cn-display); font-weight: 600;
    font-size: clamp(36px, 4.5vw, 62px); line-height: 1.15; letter-spacing: 0.005em;
    margin: 0 0 24px; color: var(--ink); text-wrap: balance;
  }
  .article-head .dek {
    font-family: var(--cn-display); font-weight: 400; font-style: italic;
    font-size: 21px; line-height: 1.55; color: var(--ink-2);
    margin: 0 auto 28px; max-width: 660px; text-wrap: pretty;
  }
  .article-head .meta {
    font-family: var(--sans); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--muted); display: flex; justify-content: center; gap: 14px; flex-wrap: wrap;
  }
  .article-head .meta .sep { color: var(--rule-2); }
  .article-hero-img { max-width: 1100px; margin: 8px auto 0; padding: 0 40px; }
  .article-body {
    max-width: 680px; margin: 0 auto; padding: 52px 28px 60px;
    font-family: var(--cn-display); font-size: 19px; line-height: 1.85; color: var(--ink-2);
  }
  .article-body p { margin: 0 0 1.4em; text-wrap: pretty; }
  .article-body .xref { color: var(--accent); border-bottom: 1px solid var(--accent); cursor: pointer; white-space: nowrap; }
  .article-body .xref:hover { opacity: .7; }
  .article-body p.first::first-letter {
    font-family: var(--display); font-size: 4.4em; line-height: 0.82;
    float: left; padding: 0.06em 0.1em 0 0; font-weight: 600; color: var(--ink);
  }
  .article-body .math { font-family: "Libre Caslon Text", Georgia, serif; font-style: italic; white-space: nowrap; }
  .article-body .math sup, .article-body .math sub { font-style: italic; }
  .article-body .end-mark {
    text-align: center; margin: 40px 0 0; font-family: var(--display);
    font-style: italic; font-size: 20px; letter-spacing: 0.4em;
  }
  .article-sources { margin: 52px 0 0; padding: 26px 0 0; border-top: 1px solid var(--rule); }
  .article-sources h4 {
    font-family: var(--sans); font-size: 11px; font-weight: 700;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin: 0 0 16px;
  }
  .article-sources ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 9px;
    font-family: var(--sans); font-size: 14px; line-height: 1.55; }
  .article-sources a { color: var(--ink-2); border-bottom: 1px solid var(--rule-2); word-break: break-all; }
  .article-sources a:hover { color: var(--accent); border-color: var(--accent); }
  /* prev / next */
  .prevnext { max-width: 800px; margin: 0 auto; padding: 8px 40px 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .prevnext a { display: block; cursor: pointer; padding: 24px 0; }
  .prevnext .pn-lab { font-family: var(--sans); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin: 0 0 8px; }
  .prevnext .pn-title { font-family: var(--cn-display); font-weight: 600; font-size: 18px; line-height: 1.35; color: var(--ink); }
  .prevnext a:hover .pn-title { color: var(--accent); }
  .prevnext .next { text-align: right; border-left: 1px solid var(--rule); padding-left: 24px; }
  .prevnext .prev { padding-right: 24px; }
  .readmore { padding: 64px 40px 80px; border-top: 1px solid var(--rule); }
  .readmore .rm-title {
    text-align: center; font-family: var(--display); font-weight: 400;
    font-size: clamp(30px, 3vw, 44px); letter-spacing: 0.16em; text-transform: uppercase;
    margin: 0 0 50px; color: var(--ink);
  }
  .readmore .rm-title em { font-style: italic; font-family: var(--serif); color: var(--accent); margin: 0 0.04em; }
  .readmore .grid { max-width: 1440px; margin: 0 auto; }

  /* ---------- Reading bar ---------- */
  .reading-bar { position: fixed; left: 0; right: 0; top: 0; height: 2px; z-index: 60; pointer-events: none; }
  .reading-bar .fill { height: 100%; background: var(--blue); width: 0%; transition: width .1s linear; }

  /* ---------- Search overlay ---------- */
  .search-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(2px);
    display: none; z-index: 70; align-items: flex-start; justify-content: center;
  }
  .search-overlay.open { display: flex; }
  .search-panel { margin-top: 12vh; width: min(720px, 90vw); background: #fff; padding: 32px; }
  .search-panel .lab {
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); margin: 0 0 16px;
  }
  .search-panel input {
    width: 100%; border: 0; border-bottom: 1px solid var(--ink); padding: 14px 0;
    font-family: var(--cn-display); font-size: 30px; background: transparent; outline: none;
  }
  .search-results { margin-top: 20px; max-height: 46vh; overflow-y: auto; }
  .search-results .sr {
    display: block; padding: 12px 0; border-bottom: 1px solid var(--rule); cursor: pointer;
  }
  .search-results .sr .sr-k { font-family: var(--sans); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); }
  .search-results .sr .sr-t { font-family: var(--cn-display); font-size: 18px; color: var(--ink); margin-top: 4px; }
  .search-results .sr:hover .sr-t { color: var(--accent); }
  .search-results .sr-empty { font-family: var(--sans); font-size: 14px; color: var(--muted); padding: 16px 0; }

  /* ---------- About / Contact modal ---------- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.72); backdrop-filter: blur(2px);
    display: none; z-index: 80; align-items: flex-start; justify-content: center;
    padding: 24px; overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal-panel {
    position: relative; margin: 8vh auto; width: min(640px, 92vw);
    background: var(--paper); padding: 56px 56px 48px;
    border-top: 3px solid var(--ink);
  }
  .modal-close {
    position: absolute; top: 18px; right: 20px;
    background: transparent; border: 0; font-size: 30px; line-height: 1;
    color: var(--muted); cursor: pointer; font-family: var(--sans);
  }
  .modal-close:hover { color: var(--accent); }
  .modal-body .m-kicker {
    font-family: var(--sans); font-size: 11px; font-weight: 700;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin: 0 0 18px;
  }
  .modal-body h3 {
    font-family: var(--cn-display); font-weight: 600;
    font-size: clamp(24px, 2.4vw, 30px); line-height: 1.3; color: var(--ink);
    margin: 0 0 18px; text-wrap: pretty;
  }
  .modal-body .m-q {
    font-family: var(--cn-display); font-weight: 600; font-size: 18px;
    color: var(--ink); margin: 26px 0 10px;
  }
  .modal-body p {
    font-family: var(--cn-display); font-size: 16px; line-height: 1.8;
    color: var(--ink-2); margin: 0 0 14px; text-wrap: pretty;
  }
  .modal-body .m-link {
    color: var(--accent); border-bottom: 1px solid var(--accent);
    font-weight: 600; white-space: nowrap;
  }
  .modal-body .m-link:hover { opacity: .7; }
  .modal-body .m-contact {
    font-family: var(--sans); font-size: 15px; line-height: 1.7; color: var(--ink-2);
    margin: 0 0 24px;
  }
  .modal-body .m-contact b { color: var(--ink); font-weight: 600; }
  .modal-body .m-qr {
    display: block; width: 200px; max-width: 60%; margin: 0 auto;
    border: 1px solid var(--rule);
  }
  .modal-body .m-qr-cap {
    text-align: center; font-family: var(--sans); font-size: 12px;
    color: var(--muted); margin: 12px 0 0;
  }
  .modal-body .m-qr-block { margin: 22px 0 4px; }
  .modal-body .m-qr-block + .m-qr-block { margin-top: 26px; padding-top: 24px; border-top: 1px solid var(--rule); }
  .modal-body .m-qr-block .m-qr { margin-bottom: 0; margin-top: 14px; }
  .modal-body .m-grp {
    text-align: center; font-family: var(--cn-display); font-weight: 600;
    font-size: 16px; color: var(--ink); margin: 0;
  }
  .modal-body .m-grp-tag {
    font-family: var(--sans); font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
    color: var(--accent); border: 1px solid var(--accent); border-radius: 3px;
    padding: 1px 5px; margin-left: 6px; vertical-align: middle;
  }
  .modal-body .m-grp-sub {
    text-align: center; font-family: var(--cn-display); font-size: 14px;
    line-height: 1.6; color: var(--muted); margin: 6px 0 0;
  }
  .modal-body .m-grp-sub b { color: var(--ink-2); font-weight: 600; }
  .modal-body .m-note {
    font-family: var(--cn-display); font-size: 15px; line-height: 1.75;
    color: var(--ink-2); margin: 4px 0 0; text-align: center;
  }
  .modal-body .m-note b { color: var(--ink); font-weight: 600; }

  /* ---------- Responsive ---------- */
  @media (max-width: 1100px) {
    .hero-inner { grid-template-columns: 1fr; }
    .hero .text { padding: 56px 32px; order: 1; }

    var bodyHtml = "";
    for (var i = 0; i < body.length; i++) {
      bodyHtml += "<p" + (i === 0 ? ' class="first"' : "") + ">" + fmt(body[i]) + "</p>";
    }
    var srcs = (it.sources || []).map(function (s) {
      return '<li><a href="' + esc(s.url) + '" target="_blank" rel="noopener">' + esc(s.label) + "</a></li>";
    }).join("");
    var styleTag = "<style>#reader .article-body p.first::first-letter{color:" + drop +
      "}#reader .end-mark{color:" + accent + "}</style>";
    var head =
      '<header class="article-head">' +
        '<span class="back" data-go="home">&larr; ' + esc(lang === "en" ? "Back to issue" : "返回本期") + "</span>" +
        '<p class="kicker">No.' + it.no + " · " + esc(catLabel(it.cat)) + "</p>" +
        "<h1>" + esc(L(it, "title")) + "</h1>" +
        '<p class="dek">' + esc(pull) + "</p>" +
        '<p class="meta"><span>' + esc(L(it, "author")) + '</span><span class="sep">·</span><span>' +
          esc(it.date) + '</span><span class="sep">·</span><span>' + it.minutes + " " + UI.minutes[lang] + "</span></p>" +
      "</header>";
    var hero =
      '<div class="article-hero-img">' + phBlock(it, "r43") + "</div>";
    var bodyBlock = '<article class="article-body">' + bodyHtml +
        '<p class="end-mark">· · ·</p>' +
        '<div class="article-sources"><h4>' + esc(UI.sources[lang]) + "</h4><ul>" + srcs + "</ul></div>" +
      "</article>";
    return styleTag + head + hero + bodyBlock;
  }
  function renderPrevNext(curId) {
    var fl = fullList();
    var idx = -1;
    for (var i = 0; i < fl.length; i++) if (fl[i].id === curId) { idx = i; break; }
    if (idx < 0) return "";
    var prev = idx > 0 ? fl[idx - 1] : null;
    var next = idx < fl.length - 1 ? fl[idx + 1] : null;
    function title(node) { return node.preface ? L(PREFACE, "title") : L(node.item, "title"); }
    var h = '<div class="prevnext">';
    h += prev
      ? '<a class="prev" data-go="' + prev.id + '"><p class="pn-lab">&larr; ' + esc(UI.prev[lang]) + '</p><p class="pn-title">' + esc(title(prev)) + "</p></a>"
      : "<span></span>";
    h += next
      ? '<a class="next" data-go="' + next.id + '"><p class="pn-lab">' + esc(UI.next[lang]) + ' &rarr;</p><p class="pn-title">' + esc(title(next)) + "</p></a>"
      : "<span></span>";
    h += "</div>";
    return h;
  }
  function renderReadMore(it) {
    var related = ITEMS.filter(function (x) { return x.cat === it.cat && x.id !== it.id; }).slice(0, 4);
    if (!related.length) return "";
    var cols = related.length >= 4 ? "" : related.length === 3 ? " cols-3" : " cols-2";
    var cards = related.map(function (a) {
      return '<article class="card">' +
        '<div data-go="' + a.id + '" style="cursor:pointer">' + phBlock(a, "r43") + "</div>" +
        '<p class="kicker">No.' + a.no + " · " + esc(catLabel(a.cat)) + "</p>" +
        "<h3 data-go=\"" + a.id + "\">" + esc(L(a, "title")) + "</h3>" +
        '<p class="dek">' + esc(L(a, "pull")) + "</p></article>";
    }).join("");
    var t = UI.readmore[lang];
    return '<section class="readmore"><h2 class="rm-title">' + esc(t[0]) + " <em>" + esc(t[1]) +
      '</em></h2><div class="grid' + cols + '">' + cards + "</div></section>";
  }
  function renderReader(id) {
    var inner;
    if (id === "no-00") {
      inner = renderReaderPreface() + renderPrevNext("no-00");
    } else {
      var it = ITEMS.filter(function (x) { return x.id === id; })[0];
      if (!it) { go("home"); return; }
      inner = renderReaderArticle(it) + renderPrevNext(id) + renderReadMore(it);
    }
    reader.innerHTML = inner;
  }

  /* ---------------- chrome / nav / footer ---------------- */
  function renderChrome() {
    document.documentElement.lang = lang === "en" ? "en" : "zh-CN";
    // nav
    var nav = document.getElementById("primaryNav");
    nav.innerHTML = ORDER.map(function (c) {
      return '<a data-sec="' + c + '">' + esc(catLabel(c)) + "</a>";
    }).join("");
    // footer columns
    var fg = document.getElementById("footGrid");
    var colTitles = UI.foot.cols[lang];
    var secLinks = ORDER.map(function (c) { return '<li><a data-sec="' + c + '">' + esc(catLabel(c)) + "</a></li>"; }).join("");
    fg.innerHTML =
      '<div class="foot-col"><h4>' + esc(colTitles[0]) + "</h4><ul>" + secLinks + "</ul></div>" +
      '<div class="foot-col"><h4>' + esc(colTitles[1]) + "</h4><ul>" +
        '<li><a data-go="no-00">' + esc(lang === "en" ? "Editor's letter" : "卷首导读") + "</a></li></ul></div>" +
      '<div class="foot-col"><h4>' + esc(colTitles[2]) + "</h4><ul>" +
        '<li><a data-modal="about">' + esc(lang === "en" ? "About" : "关于本刊") + "</a></li>" +
        '<li><a data-modal="contact">' + esc(lang === "en" ? "Contact" : "投稿与联系") + "</a></li></ul></div>" +
      '<div class="foot-col"><h4>' + esc(colTitles[3]) + "</h4><ul>" +
        '<li><a data-modal="subscribe">' + esc(lang === "en" ? "How to subscribe" : "如何订阅") + "</a></li>" +
        '<li><a href="https://cabiriawzy-hub.github.io/april-press/April%20Press.html" target="_blank" rel="noopener">' + esc(lang === "en" ? "Past issues" : "往期回顾") + "</a></li></ul></div>";
    // static [data-ui]
    document.querySelectorAll("[data-ui]").forEach(function (el) {
      var k = el.getAttribute("data-ui");
      if (k === "copy") el.innerHTML = UI.copy[lang];
      else if (UI[k]) el.textContent = UI[k][lang];
    });
    document.getElementById("searchInput").setAttribute("placeholder", UI.searchPh[lang]);
    document.getElementById("langToggle").textContent = lang === "en" ? "中" : "EN";
    document.querySelector(".search-btn").setAttribute("aria-label", UI.search[lang]);
  }
  function highlightNav(cat) {
    document.querySelectorAll("#primaryNav a").forEach(function (a) {
      a.classList.toggle("current", a.getAttribute("data-sec") === cat);
    });
  }

  /* ---------------- routing ---------------- */
  function go(target) {
    if (target === "home") { location.hash = ""; }
    else { location.hash = "#" + target; }
  }
  function showHome(scrollToCat) {
    reader.hidden = true; home.hidden = false;
    if (scrollToCat) {
      var el = document.getElementById("sec-" + scrollToCat);
      if (el) { el.scrollIntoView({ behavior: "smooth", block: "start" }); highlightNav(scrollToCat); }
    } else { highlightNav(null); window.scrollTo(0, 0); }
  }
  function showReader(id) {
    renderReader(id);
    home.hidden = true; reader.hidden = false;
    var cat = null;
    if (id !== "no-00") { var it = ITEMS.filter(function (x) { return x.id === id; })[0]; if (it) cat = it.cat; }
    highlightNav(cat);
    window.scrollTo(0, 0);
  }
  function route() {
    var h = location.hash.replace(/^#/, "");
    if (/^no-\d{2}$/.test(h)) showReader(h);
    else showHome(null);
  }

  /* ---------------- search ---------------- */
  function runSearch(q) {
    var box = document.getElementById("searchResults");
    q = (q || "").trim().toLowerCase();
    if (!q) { box.innerHTML = ""; return; }
    var hits = ITEMS.filter(function (it) {
      return (L(it, "title") + " " + L(it, "pull") + " " + L(it, "author")).toLowerCase().indexOf(q) >= 0;
    }).slice(0, 8);
    if (!hits.length) { box.innerHTML = '<p class="sr-empty">' + (lang === "en" ? "No matches." : "没有匹配。") + "</p>"; return; }
    box.innerHTML = hits.map(function (it) {
      return '<a class="sr" data-go="' + it.id + '"><span class="sr-k">No.' + it.no + " · " + esc(catLabel(it.cat)) +
        '</span><span class="sr-t">' + esc(L(it, "title")) + "</span></a>";
    }).join("");
  }

  /* ---------------- events ---------------- */
  function applyLang() {
    renderChrome();
    renderHome();
    route();
  }
  document.addEventListener("click", function (e) {
    var m = e.target.closest("[data-modal]");
    if (m) { e.preventDefault(); openModal(m.getAttribute("data-modal")); return; }
    var t = e.target.closest("[data-go]");
    if (t) { e.preventDefault(); document.getElementById("searchOverlay").classList.remove("open"); go(t.getAttribute("data-go")); return; }
    var s = e.target.closest("[data-sec]");
    if (s) {
      e.preventDefault();
      var cat = s.getAttribute("data-sec");
      var overlay = document.getElementById("searchOverlay"); overlay.classList.remove("open");
      if (!reader.hidden) { reader.hidden = true; home.hidden = false; }
      showHome(cat);
      return;
    }
  });
  // about / contact modal
  var modalOverlay = document.getElementById("modalOverlay");
  function openModal(key) {
    var m = MODALS[key]; if (!m) return;
    document.getElementById("modalBody").innerHTML = m.html[lang] || m.html.zh;
    modalOverlay.classList.add("open");
  }
  function closeModal() { modalOverlay.classList.remove("open"); }
  document.getElementById("modalClose").addEventListener("click", closeModal);
  modalOverlay.addEventListener("click", function (e) { if (e.target === modalOverlay) closeModal(); });
  document.getElementById("masthead").addEventListener("click", function () { go("home"); });
  document.getElementById("footMast").addEventListener("click", function () { go("home"); });
  document.getElementById("langToggle").addEventListener("click", function () {
    lang = lang === "en" ? "zh" : "en";
    localStorage.setItem("mp-lang", lang);
    applyLang();
  });
  // search overlay
  var overlay = document.getElementById("searchOverlay");
  document.getElementById("openSearch").addEventListener("click", function () {
    overlay.classList.add("open");
    setTimeout(function () { document.getElementById("searchInput").focus(); }, 50);
  });
  overlay.addEventListener("click", function (e) { if (e.target === overlay) overlay.classList.remove("open"); });
  document.getElementById("searchInput").addEventListener("input", function (e) { runSearch(e.target.value); });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") { overlay.classList.remove("open"); closeModal(); }
    if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); overlay.classList.add("open"); setTimeout(function () { document.getElementById("searchInput").focus(); }, 50); }
  });
  // reading progress + scroll-spy nav highlight
  var fill = document.getElementById("readFill");
  var navEl = document.querySelector("nav.primary");
  var spyTicking = false;
  function onScroll() {
    spyTicking = false;
    var d = document.documentElement;
    var pct = d.scrollTop / (d.scrollHeight - d.clientHeight) * 100;
    fill.style.width = Math.min(100, Math.max(0, pct)) + "%";
    // scroll-spy: only on home view
    if (home.hidden) return;
    var refLine = (navEl ? navEl.getBoundingClientRect().bottom : 150) + 8;
    var cur = null;
    document.querySelectorAll("section.feed[id^='sec-']").forEach(function (s) {
      if (s.getBoundingClientRect().top <= refLine) cur = s.id.slice(4);
    });
    highlightNav(cur);
  }
  window.addEventListener("scroll", function () {
    if (!spyTicking) { spyTicking = true; requestAnimationFrame(onScroll); }
  }, { passive: true });
  window.addEventListener("hashchange", route);

  // boot
  if (!ITEMS.length) {
    home.innerHTML = '<section class="feed"><p style="text-align:center;color:#888">data.js 未加载或为空。请在本地服务器下打开（见说明）。</p></section>';
  } else {
    applyLang();
  }
})();
</script>
</body>
</html>
